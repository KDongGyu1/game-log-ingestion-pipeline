services:
  redis:
    image: redis:7.4-alpine
    container_name: log-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - log-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api-server
    container_name: log-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - log-net
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  consumer:
    build: ./consumer
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - log-net

networks:
  log-net:

volumes:
  redis-data:
