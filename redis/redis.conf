# ---- Persistence: AOF ----
# 유실 최소화를 위해 AOF 활성화
appendonly yes

# fsync 정책
#  - always : 유실 최소, 성능 급감
#  - everysec : 최대 1초 유실, 성능 양호 (권장)
#  - no : OS에 위임, 최대 유실 큼
appendfsync everysec

# AOF 재작성 트리거
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ---- RDB snapshot (보조) ----
save 900 1
save 300 10
save 60 10000

# ---- Memory ----
# 과제용 임의값. 프로덕션은 인스턴스 스펙에 맞춰 조정
maxmemory 512mb
# stream이 주 데이터라 allkeys-lru는 위험. noeviction으로 명시적 실패 유도.
maxmemory-policy noeviction

# ---- Network ----
timeout 0
tcp-keepalive 300